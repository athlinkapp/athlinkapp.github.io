  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --card:      #0F172A;
      --card-alt:  #0D1525;
      --border:    rgba(255,255,255,0.08);
      --border-s:  rgba(255,255,255,0.04);
      --primary:   #6366F1;
      --primary-d: #4F46E5;
      --primary-g: rgba(99,102,241,0.15);
      --primary-border: rgba(99,102,241,0.28);
      --text:      #F1F5F9;
      --sub:       #94A3B8;
      --muted:     #64748B;
      --gold:      #F59E0B;
      --success:   #10B981;
      --radius:    22px;
      --radius-sm: 14px;
      --banner-bg: rgba(2,6,23,0.8);
      --overlay-1: rgba(2,6,23,0.15);
      --overlay-2: rgba(2,6,23,0.75);
      --surface-shadow: rgba(0,0,0,0.5);
      --btn-shadow: rgba(99,102,241,0.4);
      --btn-shadow-soft: rgba(99,102,241,0.3);
      --cta-glow: rgba(99,102,241,0.45);
      --cta-bg-1: rgba(99,102,241,0.14);
      --cta-bg-2: rgba(79,70,229,0.06);
      --cta-border: rgba(99,102,241,0.25);
      --cta-halo: rgba(99,102,241,0.12);
      --wave-bg: #020617;
      --wave-1: #6366F1;
      --wave-2: #818cf8;
      --wave-3: #4F46E5;
      --wave-4: #a78bfa;
      --wave-5: #38bdf8;
    }

    :root[data-theme="morning"] {
      --bg:        #F4F8FF;
      --card:      #E8F1FF;
      --card-alt:  #DDEBFF;
      --border:    rgba(59,130,246,0.16);
      --border-s:  rgba(59,130,246,0.08);
      --primary:   #3B82F6;
      --primary-d: #2563EB;
      --primary-g: rgba(59,130,246,0.18);
      --primary-border: rgba(37,99,235,0.32);
      --text:      #1F2937;
      --sub:       #475569;
      --muted:     #64748B;
      --gold:      #FF9A3C;
      --success:   #059669;
      --banner-bg: rgba(244,248,255,0.9);
      --overlay-1: rgba(232,241,255,0.45);
      --overlay-2: rgba(59,130,246,0.25);
      --surface-shadow: rgba(37,99,235,0.18);
      --btn-shadow: rgba(59,130,246,0.38);
      --btn-shadow-soft: rgba(59,130,246,0.28);
      --cta-glow: rgba(59,130,246,0.35);
      --cta-bg-1: rgba(59,130,246,0.16);
      --cta-bg-2: rgba(37,99,235,0.08);
      --cta-border: rgba(37,99,235,0.28);
      --cta-halo: rgba(59,130,246,0.16);
      --wave-bg: #F4F8FF;
      --wave-1: #3B82F6;
      --wave-2: #60A5FA;
      --wave-3: #FF9A3C;
      --wave-4: #2563EB;
      --wave-5: #93C5FD;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, .app-banner-text strong, .section-title, .stat-value, .badge, .listing-price {
      font-family: 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: -0.2px;
    }

    /* ─── BACKGROUND ──────────────────────────────────── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    #wave-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.45;
    }
    .bg-fade {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 120% 50% at 50% 0%, transparent 30%, var(--bg) 80%);
    }

    /* ─── APP BANNER ──────────────────────────────────── */
    .app-banner {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--banner-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
    }
    .app-banner-logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .app-banner-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .app-banner-logo-fallback {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-d) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }
    .app-banner-text { flex: 1; min-width: 0; }
    .app-banner-text strong {
      display: block;
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.3;
    }
    .app-banner-text span {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    .app-banner-btn {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-d) 100%);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 14px var(--btn-shadow);
      font-family: inherit;
    }
    .app-banner-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 6px 18px var(--surface-shadow);
    }
    .theme-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      font-family: inherit;
    }
    .theme-btn:hover { color: var(--text); transform: translateY(-1px); }
    .theme-btn.active {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-d) 100%);
      color: #fff;
      box-shadow: 0 4px 12px var(--btn-shadow-soft);
    }
    .theme-btn.auto { color: var(--sub); }

    /* ─── MAIN LAYOUT ─────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 0 0 80px;
    }

    /* ─── HERO / BANNER ───────────────────────────────── */
    .banner-wrap {
      width: 100%;
      height: 230px;
      position: relative;
      overflow: hidden;
    }
    .banner-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, var(--overlay-1) 0%, var(--overlay-2) 100%);
    }
    .banner-placeholder {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, var(--card-alt) 0%, var(--card) 50%, var(--bg) 100%);
      position: relative;
      overflow: hidden;
    }
    .banner-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 50% 100%, var(--primary-g) 0%, transparent 70%);
    }

    /* ─── HEADER SECTION ──────────────────────────────── */
    .header-section {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      padding: 0 20px;
      margin-top: -52px;
      position: relative;
      z-index: 2;
      margin-bottom: 20px;
    }
    .header-section.no-banner {
      align-items: center;
      margin-top: 20px;
    }
    .avatar-wrap { flex-shrink: 0; }
    .avatar-img {
      width: 96px;
      height: 96px;
      border-radius: 50%;

      display: block;

    .avatar-placeholder {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 4px solid var(--bg);
      background: linear-gradient(135deg, var(--card-alt) 0%, var(--card) 100%);
      outline: 1px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 800;
      color: var(--text);
      box-shadow: 0 0 0 1px var(--primary-g), 0 8px 24px var(--surface-shadow);
    }
    .identity { flex: 1; padding-bottom: 4px; }
    .identity.with-banner { padding-top: 48px; }
    .identity h1 {
      font-size: 26px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.15;
      letter-spacing: -0.3px;
    }
    .identity .detail {
      font-size: 14px;
      color: var(--sub);
      font-weight: 500;
      margin-bottom: 3px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--primary-g);

      font-weight: 700;

    /* ─── STATS ROW ───────────────────────────────────── */
    .stats-row {
      display: flex;
      align-items: stretch;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin: 0 20px 16px;
      overflow: hidden;
    }
    .stat-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 6px;
      min-height: 76px;

    .stat-divider {
      width: 1px;

      align-self: stretch;

    .stat-label {
      font-size: 10px;

      color: var(--muted);
      text-transform: uppercase;

    .stat-value {

      font-weight: 800;

      text-align: center;

    .stat-sub {
      font-size: 10px;
      color: var(--muted);
      font-weight: 600;
      margin-top: 3px;
    }

    /* ─── SECTIONS ────────────────────────────────────── */
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin: 0 20px 16px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 14px;
      letter-spacing: -0.2px;
    }
    .section-text {
      font-size: 15px;
      color: var(--sub);
      line-height: 1.7;
    }

    /* ─── LISTINGS ────────────────────────────────────── */
    .listing-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      gap: 12px;
    }
    .listing-row + .listing-row {
      border-top: 1px solid var(--border-s);
    }
    .listing-info { flex: 1; min-width: 0; }
    .listing-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .listing-meta {
      font-size: 12px;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 3px;
      opacity: 0.9;
    }
    .listing-tags {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }
    .listing-action {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }
    .listing-price {
      font-size: 17px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -0.2px;
    }
    .request-btn {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-d) 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
      box-shadow: 0 4px 12px var(--btn-shadow-soft);
    }
    .request-btn:hover { opacity: 0.85; transform: translateY(-1px); }

    /* ─── REVIEWS ─────────────────────────────────────── */
    .review-card {
      padding: 14px 0;
      border-bottom: 1px solid var(--border-s);
    }
    .review-card:last-child { border-bottom: none; }
    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
    }
    .review-stars {
      color: var(--gold);
      font-size: 13px;
      letter-spacing: 2px;
    }
    .review-learner {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }
    .review-text {
      font-size: 14px;
      color: var(--sub);
      line-height: 1.6;
    }

    /* ─── CTA ─────────────────────────────────────────── */
    .cta-section {
      margin: 0 20px 16px;
      background: linear-gradient(135deg, var(--cta-bg-1) 0%, var(--cta-bg-2) 100%);
      border: 1px solid var(--cta-border);
      border-radius: var(--radius);
      padding: 28px 22px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .cta-section::before {
      content: '';
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 200px;
      background: radial-gradient(ellipse, var(--cta-halo) 0%, transparent 70%);
      pointer-events: none;

    .cta-section h2 {
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
      position: relative;
    }
    .cta-section p {
      font-size: 14px;
      color: var(--sub);
      margin-bottom: 22px;
      line-height: 1.6;
      position: relative;
    }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-d) 100%);
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 15px 30px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.15s;
      box-shadow: 0 8px 28px var(--cta-glow);
      font-family: inherit;
      letter-spacing: -0.2px;
      position: relative;
    }
    .cta-btn:hover { opacity: 0.88; transform: translateY(-2px); }
    .cta-sub {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      position: relative;
    }

    /* ─── LOADING / ERROR ─────────────────────────────── */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
      color: var(--muted);
      font-size: 15px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 2.5px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── FOOTER ──────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 28px 18px 20px;
      position: relative;
      z-index: 1;
    }
    footer .footer-logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      margin-bottom: 8px;
    }
    footer .footer-logo img {
      width: 24px;
      height: 24px;
      border-radius: 6px;
    }
    footer .footer-logo span {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
    }
    footer p {
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 640px) {
      .app-banner { padding: 8px 14px; flex-wrap: wrap; }
      .app-banner-btn { width: 100%; text-align: center; }
      .theme-toggle { padding: 3px; }
      .theme-btn { padding: 5px 8px; font-size: 10px; }

      .header-section { padding: 0 14px; gap: 12px; }
      .avatar-img, .avatar-placeholder { width: 78px; height: 78px; }
      .avatar-placeholder { font-size: 28px; }
      .identity h1 { font-size: 22px; }
      .identity.with-banner { padding-top: 38px; }

      .stats-row { margin: 0 14px 14px; flex-wrap: wrap; border-radius: 16px; }
      .stat-item { min-width: 50%; padding: 12px 6px; }
      .stat-item:nth-child(5) { border-left: none; border-top: 1px solid var(--border); }
      .stat-item:nth-child(7) { border-left: none; border-top: 1px solid var(--border); }
      .stat-divider:nth-child(4), .stat-divider:nth-child(8) { display: none; }
      .stat-value { font-size: 17px; }

      .section { margin: 0 14px 14px; padding: 16px; border-radius: 16px; }
      .listing-title { font-size: 14px; }
      .request-btn { padding: 7px 13px; font-size: 12px; }

      .cta-section { margin: 0 14px 14px; padding: 22px 16px; border-radius: 16px; }
      .cta-btn { font-size: 15px; padding: 13px 22px; }

      footer { padding: 20px 14px; }
    }
  </style>
</head>

<script>
  (function () {
    const root = document.documentElement;
    const storageKey = "athlinkTheme";
    const params = new URLSearchParams(window.location.search);
    const paramTheme = params.get("theme");
    let override = (paramTheme === "morning" || paramTheme === "night")
      ? paramTheme
      : localStorage.getItem(storageKey);

    function themeForNow() {
      const hour = new Date().getHours();
      return hour >= 6 && hour < 18 ? "morning" : "night";
    }
    function applyTheme() {
      const next = override || themeForNow();
      root.setAttribute("data-theme", next);
      if (typeof window.__refreshWaves === "function") window.__refreshWaves();
      updateToggle(next);
    }
    function setOverride(next) {
      override = next;
      localStorage.setItem(storageKey, next);
      applyTheme();
    }
    function clearOverride() {
      override = null;
      localStorage.removeItem(storageKey);
      applyTheme();
    }
    function updateToggle(active) {
      const morningBtn = document.getElementById("theme-morning");
      const nightBtn = document.getElementById("theme-night");
      const autoBtn = document.getElementById("theme-auto");
      if (!morningBtn || !nightBtn || !autoBtn) return;
      morningBtn.classList.toggle("active", active === "morning");
      nightBtn.classList.toggle("active", active === "night");
      autoBtn.classList.toggle("active", !override);
    }
    applyTheme();
    setInterval(applyTheme, 60 * 60 * 1000);

    document.addEventListener("DOMContentLoaded", () => {
      applyTheme();
    });

    document.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      if (target.id === "theme-morning") setOverride("morning");
      if (target.id === "theme-night") setOverride("night");
      if (target.id === "theme-auto") clearOverride();
    });
  })();
</script>

<!-- Wavy background -->
<script type="module">
  import { createNoise3D } from "simplex-noise";

  const canvas = document.getElementById("wave-canvas");
  const ctx    = canvas.getContext("2d");
  const noise  = createNoise3D();

  let COLORS = [];
  let bgColor = "#020617";
  const SPEED   = 0.0012;
  const BLUR    = 18;
  let w, h, nt = 0, animId;

  const isSafari = navigator.userAgent.includes("Safari") && !navigator.userAgent.includes("Chrome");

  function resize() {
    w = canvas.width  = window.innerWidth;
    h = canvas.height = window.innerHeight;
    if (!isSafari) ctx.filter = `blur(${BLUR}px)`;
  }

  function readWavePalette() {
    const styles = getComputedStyle(document.documentElement);
    bgColor = styles.getPropertyValue("--wave-bg").trim() || "#020617";
    COLORS = [
      styles.getPropertyValue("--wave-1").trim(),
      styles.getPropertyValue("--wave-2").trim(),
      styles.getPropertyValue("--wave-3").trim(),
      styles.getPropertyValue("--wave-4").trim(),
      styles.getPropertyValue("--wave-5").trim(),
    ].filter(Boolean);
  }

  function draw() {
    ctx.fillStyle = bgColor;
    ctx.globalAlpha = 1;
    ctx.fillRect(0, 0, w, h);

    nt += SPEED;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.lineWidth  = 52;
      ctx.strokeStyle = COLORS[i % COLORS.length];
      ctx.globalAlpha = 0.5;
      for (let x = 0; x < w; x += 5) {
        const y = noise(x / 900, 0.3 * i, nt) * 110;
        ctx.lineTo(x, y + h * 0.5);
      }
      ctx.stroke();
      ctx.closePath();
    }
    animId = requestAnimationFrame(draw);
  }

  resize();
  if (isSafari) canvas.style.filter = `blur(${BLUR}px)`;
  readWavePalette();
  draw();
  window.addEventListener("resize", resize);
  window.addEventListener("visibilitychange", readWavePalette);
  window.__refreshWaves = readWavePalette;
</script>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDsHcHwFRfM41ZeqNO8oAkXYblbjTabyTI",
    authDomain: "athleteiq-63953.firebaseapp.com",
    projectId: "athleteiq-63953",
    storageBucket: "athleteiq-63953.firebasestorage.app",
    messagingSenderId: "878506971111",
    appId: "1:878506971111:web:9bc2c8f84c646b6d1e3742",
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const uid = params.get("uid");

  const APP_STORE_URL = "https://apps.apple.com/app/athlink/id000000000";
  const DEEP_LINK     = uid ? `athlink://instructor/${uid}` : null;

  function tryOpenApp(fallback) {
    if (!DEEP_LINK) { window.location.href = APP_STORE_URL; return; }
    const start = Date.now();
    window.location.href = DEEP_LINK;
    setTimeout(() => {
      if (document.visibilityState !== "hidden" && Date.now() - start < 3000) {
        window.location.href = fallback || APP_STORE_URL;
      }
    }, 1800);
  }

  document.getElementById("banner-open-btn").addEventListener("click", (e) => {
    e.preventDefault();
    tryOpenApp(APP_STORE_URL);
  });

  function stars(n) {
    return "★".repeat(n) + "☆".repeat(5 - n);
  }
  function esc(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }
  function formatResponse(totalMinutes, count) {
    if (!totalMinutes || !count) return "—";
    const avg = Math.round(totalMinutes / count);
    if (avg < 60) return `${avg}m`;
    if (avg < 1440) return `${Math.round(avg / 60)}h`;
    return `${Math.round(avg / 1440)}d`;
  }

  function render(instructor, listings, reviews) {
    const name    = instructor.name?.trim()     || "Unnamed Instructor";
    const sport   = instructor.sport?.trim()    || "";
    const pos     = instructor.position?.trim() || "";
    const school  = instructor.school?.trim()   || "";
    const bio     = instructor.bio?.trim()      || "";
    const image   = instructor.image            || "";
    const banner  = instructor.businessImage    || "";
    const tier    = instructor.subscriptionTier || "free";
    const initial = name.charAt(0).toUpperCase();

    const ratings = reviews.map(r => r.rating).filter(Boolean);
    const avgRating = ratings.length
      ? Math.round(ratings.reduce((a,b) => a+b, 0) / ratings.length * 10) / 10
      : null;

    let minPrice = null;
    listings.forEach(l => {
      const p = Number(l.price);
      if (p > 0 && (minPrice === null || p < minPrice)) minPrice = p;
    });

    const avgResp  = formatResponse(instructor.totalResponseMinutes, instructor.responseCount);
    const completed = instructor.completedRequests ?? 0;

    document.title = `${name} – Athlink`;
    document.getElementById("og-title").content = `${name} on Athlink`;
    document.getElementById("og-desc").content  = bio || `Book coaching advice from ${name} on Athlink.`;
    if (image) document.getElementById("og-image").content = image;

    const bannerHtml = banner
      ? `<div class="banner-wrap">
           <img class="banner-img" src="${esc(banner)}" alt="" />
           <div class="banner-overlay"></div>
         </div>`
      : `<div class="banner-placeholder"></div>`;

    const avatarHtml = image
      ? `<img class="avatar-img" src="${esc(image)}" alt="${esc(name)}" />`
      : `<div class="avatar-placeholder">${esc(initial)}</div>`;

    const tierBadge = tier !== "free"
      ? `<span class="badge">⚡ ${esc(tier.charAt(0).toUpperCase() + tier.slice(1))}</span>`
      : "";

    const listingsHtml = listings.length > 0
      ? `<div class="section">
          <div class="section-title">Offerings</div>
          ${listings.map(l => `
            <div class="listing-row">
              <div class="listing-info">
                <div class="listing-title">${esc(l.title || "")}</div>
                ${(l.type || l.duration) ? `<div class="listing-meta">${esc(l.type || "")}${l.duration ? ` · ${l.duration}m` : ""}</div>` : ""}
                ${l.tags?.length ? `<div class="listing-tags">${esc(l.tags.join(", "))}</div>` : ""}
              </div>
              <div class="listing-action">
                <div class="listing-price">${!l.price ? "Free" : `$${l.price}`}</div>
                <button class="request-btn" onclick="window.__tryOpen()">Request</button>
              </div>
            </div>
          `).join("")}
        </div>`
      : "";

    const reviewsHtml = reviews.length > 0
      ? `<div class="section">
          <div class="section-title">Reviews (${reviews.length})</div>
          ${reviews.slice(0, 10).map(r => `
            <div class="review-card">
              <div class="review-header">
                <span class="review-stars">${stars(r.rating || 0)}</span>
                <span class="review-learner">${esc(r.learnerName || "")}</span>
              </div>
              ${r.text ? `<div class="review-text">${esc(r.text)}</div>` : ""}
            </div>
          `).join("")}
        </div>`
      : "";

    const bioHtml = bio
      ? `<div class="section">
           <div class="section-title">About Me</div>
           <div class="section-text">${esc(bio)}</div>
         </div>`
      : "";

    document.getElementById("root").innerHTML = `
      ${bannerHtml}

      <div class="header-section ${!banner ? "no-banner" : ""}">
        <div class="avatar-wrap">${avatarHtml}</div>
        <div class="identity ${banner ? "with-banner" : ""}">
          <h1>${esc(name)}</h1>
          ${(sport || pos) ? `<div class="detail">${esc([sport,pos].filter(Boolean).join(" · "))}</div>` : ""}
          ${school ? `<div class="detail">${esc(school)}</div>` : ""}
          ${tierBadge}
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-label">Rating</div>
          <div class="stat-value gold">${avgRating !== null ? `★ ${avgRating}` : "—"}</div>
          ${reviews.length ? `<div class="stat-sub">(${reviews.length})</div>` : ""}
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-label">Starting Rate</div>
          <div class="stat-value">${minPrice === null || minPrice === 0 ? "Free" : `$${minPrice}`}</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-label">Sessions</div>
          <div class="stat-value">${completed}</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-label">Avg Response</div>
          <div class="stat-value">${avgResp}</div>
        </div>
      </div>

      ${bioHtml}
      ${listingsHtml}
      ${reviewsHtml}

      <div class="cta-section">
        <h2>Ready to get coached?</h2>
        <p>Download Athlink to book a session with ${esc(name)} and connect with top athletes.</p>
        <a class="cta-btn" href="#" onclick="event.preventDefault(); window.__tryOpen()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Open in Athlink
        </a>
        <div class="cta-sub">Free on the App Store · iOS</div>
      </div>
    `;
  }

  function renderError() {
    document.getElementById("root").innerHTML = `
      <div class="loading-wrap" style="flex-direction:column;gap:12px;padding:60px 18px;text-align:center;">
        <div style="font-size:52px;opacity:0.6;">🔍</div>
        <div style="font-size:20px;font-weight:900;color:var(--text);letter-spacing:-0.3px;">Profile not found</div>
        <div style="color:var(--muted);font-size:14px;line-height:1.6;max-width:260px;">This instructor may have removed their profile.</div>
        <a href="https://athlinkapp.github.io" style="margin-top:10px;color:var(--primary);font-weight:700;font-size:14px;text-decoration:none;">← Back to Athlink</a>
      </div>
    `;
  }

  window.__tryOpen = () => tryOpenApp(APP_STORE_URL);

  async function main() {
    if (!uid) { renderError(); return; }
    try {
      const [userSnap, listingSnap, reviewSnap] = await Promise.all([
        getDoc(doc(db, "users", uid)),
        getDocs(query(collection(db, "listings"), where("instructorId", "==", uid), where("active", "==", true))),
        getDocs(query(collection(db, "reviews"), where("instructorId", "==", uid))),
      ]);

      if (!userSnap.exists()) { renderError(); return; }

      const instructor = { id: userSnap.id, ...userSnap.data() };
      const listings   = listingSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      const reviews    = reviewSnap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (b.createdAt?.seconds ?? 0) - (a.createdAt?.seconds ?? 0));

      render(instructor, listings, reviews);
    } catch (err) {
      console.error(err);
      renderError();
    }
  }

  main();
</script>
</body>
</html>
